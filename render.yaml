services:
  # Express.js Node Backend API Service
  - type: web
    name: newone-shop-api
    env: node
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Vite React Frontend Web Service
  - type: web
    name: newone-shop-web
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
