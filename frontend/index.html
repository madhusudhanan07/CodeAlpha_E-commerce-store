<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Title & Description -->
    <title>CodeAlpha — Modern E-Commerce Store</title>
    <meta
      name="description"
      content="CodeAlpha is a modern, fast, and intuitive e-commerce platform. Discover curated products, seamless checkout, and a premium shopping experience."

    <meta property="og:title"       content="CodeAlpha — Modern E-Commerce Store" />
    <meta property="og:description" content="Shop smarter with CodeAlpha — your modern e-commerce destination." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
